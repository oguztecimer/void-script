[mod]
id = "core"
name = "Core"
version = "0.1.0"

[[entities]]
type = "summoner"
sprite = "sprites/summoner_atlas"
pivot = [49.0, 2.0]
health = 100
energy = 100
speed = 1

[[entities]]
type = "skeleton"
sprite = "sprites/skeleton_atlas"
pivot = [24.0, 0.0]
health = 50
energy = 50
speed = 2

[[spawn]]
entity_type = "summoner"
name = "summoner"
position = 500

[initial]
effects = [
  { type = "output", message = "The dead stir beneath your feet" },
  { type = "output", message = "Type help() to hear the bones speak" },
]

[commands]
initial = ["help", "raise", "harvest", "pact"]

[[commands.definitions]]
name = "help"
description = "Hidden wisdom will be found"
args = []
effects = [
  { type = "modify_stat", target = "self", stat = "energy", amount = 10 },
  { type = "list_commands" },
]

[[commands.definitions]]
name = "raise"
description = "From the ground, the dead are bound"
args = []
effects = [
  { type = "use_resource", stat = "energy", amount = 30 },
  { type = "spawn", entity_type = "skeleton", offset = 1 },
  { type = "output", message = "[raise] A skeleton rises!" },
]

[[commands.definitions]]
name = "harvest"
description = "The children slain, bones remain"
args = []
effects = [
  { type = "modify_stat", target = "self", stat = "energy", amount = 20 },
  { type = "output", message = "[harvest] Essence absorbed." },
]

[[commands.definitions]]
name = "pact"
description = "Pledge your bones to my domain"
args = []
effects = [
  { type = "modify_stat", target = "self", stat = "health", amount = -10 },
  { type = "modify_stat", target = "self", stat = "energy", amount = 50 },
  { type = "output", message = "[pact] Power surges through you..." },
]
