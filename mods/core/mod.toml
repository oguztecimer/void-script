[mod]
id = "core"
name = "Core"
version = "0.1.0"

# --- Type Definitions ---
# Types are composable tags with stats and commands.
# Entities reference types to inherit their stats and capabilities.

[[types]]
name = "main"
stats = { health = 100, speed = 1 }
commands = ["help", "trance", "raise", "harvest", "pact", "scan", "nearest", "distance", "get_pos", "get_health", "get_shield", "get_target", "has_target", "get_type", "get_name", "get_owner", "get_resource", "get_stat", "get_custom_stat", "get_types", "has_type", "wait", "gain_resource", "try_spend_resource"]

[[types]]
name = "unit"
stats = { health = 1, speed = 1 }
commands = ["move", "attack", "flee", "wait", "set_target", "scan", "nearest", "distance", "get_pos", "get_health", "get_shield", "get_target", "has_target", "get_type", "get_name", "get_owner", "get_resource", "get_stat", "get_custom_stat", "get_types", "has_type", "gain_resource", "try_spend_resource"]

[[types]]
name = "summoner"
brain = true
stats = { health = 100}
commands = ["help", "trance", "raise", "harvest", "pact"]

[[types]]
name = "skeleton"
brain = true
stats = { health = 5}

# --- Entity Definitions ---

[[entities]]
id = "summoner"
types = ["unit","summoner"]
sprite = "sprites/summoner_atlas"
pivot = [49.0, 2.0]

[[entities]]
id = "skeleton"
types = ["unit","skeleton"]
sprite = "sprites/skeleton_atlas"
pivot = [24.0, 0.0]

# --- Resources ---

[resources]
mana = { value = 50, max = 100 }
bones = 0

# --- Initial State ---

[initial]
resources = ["mana", "bones"]
effects = [
  { type = "spawn", entity_id = "summoner", offset=0},
  { type = "output", message = "The dead stir beneath your feet" },
  { type = "output", message = "Call for <hl>help()</hl> to hear them speak" },
]

# --- Game Builtins (queries, actions, instant effects) ---

# Queries
[[commands.definitions]]
name = "scan"
kind = "query"
args = ["filter"]

[[commands.definitions]]
name = "nearest"
kind = "query"
args = ["filter"]

[[commands.definitions]]
name = "distance"
kind = "query"
args = ["e1", "e2"]

[[commands.definitions]]
name = "get_pos"
kind = "query"
args = ["entity"]
implicit_self = true

[[commands.definitions]]
name = "get_health"
kind = "query"
args = ["entity"]
implicit_self = true

[[commands.definitions]]
name = "get_shield"
kind = "query"
args = ["entity"]
implicit_self = true

[[commands.definitions]]
name = "get_target"
kind = "query"
args = ["entity"]
implicit_self = true

[[commands.definitions]]
name = "has_target"
kind = "query"
args = ["entity"]
implicit_self = true

[[commands.definitions]]
name = "get_type"
kind = "query"
args = ["entity"]

[[commands.definitions]]
name = "get_name"
kind = "query"
args = ["entity"]

[[commands.definitions]]
name = "get_owner"
kind = "query"
args = ["entity"]

[[commands.definitions]]
name = "get_resource"
kind = "query"
args = ["name"]

[[commands.definitions]]
name = "get_stat"
kind = "query"
args = ["entity", "stat_name"]

[[commands.definitions]]
name = "get_custom_stat"
kind = "query"
args = ["entity", "stat_name"]

[[commands.definitions]]
name = "get_types"
kind = "query"
args = ["entity"]

[[commands.definitions]]
name = "has_type"
kind = "query"
args = ["entity", "name"]

# Actions
[[commands.definitions]]
name = "move"
kind = "action"
args = ["position"]

[[commands.definitions]]
name = "attack"
kind = "action"
args = ["target"]

[[commands.definitions]]
name = "flee"
kind = "action"
args = ["threat"]

[[commands.definitions]]
name = "wait"
kind = "action"
args = []

[[commands.definitions]]
name = "set_target"
kind = "action"
args = ["target"]

# Instant effects
[[commands.definitions]]
name = "gain_resource"
kind = "instant"
args = ["name", "amount"]

[[commands.definitions]]
name = "try_spend_resource"
kind = "instant"
args = ["name", "amount"]

# --- Custom Commands ---

[[commands.definitions]]
name = "help"
description = "Hidden wisdom will be found"
unlisted = true
args = []
effects = [
  { type = "output", message = " " },
  { type = "list_commands" },
]

[[commands.definitions]]
name = "trance"
description = "Deep in trance, what's lost is found"
args = []
phases = [
  { ticks = 1000, interruptible = true, update_interval = 5, per_update = [
    { type = "modify_resource", resource = "mana", amount = 1 },
  ], on_start =[
    { type = "output", message = "[trance] You feel the mana flowing in." }
  ]}
]

[[commands.definitions]]
name = "raise"
description = "From the ground, the dead are bound"
args = []
phases = [
  { ticks = 12, interruptible = true, on_start = [
    { type = "animate", target = "self", animation = "cast" }
  ]},
  { ticks = 1, interruptible = false, on_start = [
    { type = "use_global_resource", resource = "mana", amount = 20}
  ]},
  { ticks = 18, interruptible = false, on_start = [
    { type = "spawn", entity_id = "skeleton", offset = "rand(-300,300)"}
  ]},
]

[[commands.definitions]]
name = "harvest"
description = "The children slain, bones remain"
args = []
phases = [
  { ticks = 12, interruptible = true, on_start = [
    { type = "animate", target = "self", animation = "cast" }
  ]},
  { ticks = 1, interruptible = false, on_start = [
    { type = "use_global_resource", resource = "mana", amount = 50}
  ]},
  { ticks = 1, interruptible = false, on_start = []},
  { ticks = 18, interruptible = false, on_start = []},
]

[[commands.definitions]]
name = "pact"
description = "Pledge your bones to my domain"
args = []
effects = [
  { type = "modify_stat", target = "self", stat = "health", amount = -10 },
  { type = "output", message = "[pact] Power surges through you..." },
]
