[mod]
id = "core"
name = "Core"
version = "0.1.0"
world_width = 1000

# --- Type Definitions ---

[[types]]
name = "grimoire"
stats = { health = 100, speed = 1 }
commands = ["help", "trance", "raise", "harvest", "pact"]

[[types]]
name = "unit"
stats = { health = 1, speed = 1 }

[[types]]
name = "summoner"
soul = true
stats = { health = 100 }

[[types]]
name = "skeleton"
soul = true
stats = { health = 5 }

# --- Entity Definitions ---

[[entities]]
id = "summoner"
types = ["unit", "summoner"]
sprite = "sprites/summoner_atlas"
pivot = [49.0, 2.0]

[[entities]]
id = "skeleton"
types = ["unit", "skeleton"]
sprite = "sprites/skeleton_atlas"
pivot = [24.0, 0.0]

# --- Resources ---

[resources]
mana = { value = 50, max = 100 }
bones = 0

# --- Initial State ---

[initial]
resources = ["mana", "bones"]
