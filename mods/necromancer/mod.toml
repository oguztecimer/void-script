[mod]
id = "necromancer"
name = "Necromancer"
version = "0.1.0"

[[entities]]
type = "summoner"
sprite = "sprites/summoner_atlas"
pivot = [49.0, 2.0]
health = 100
energy = 100
speed = 1

[[entities]]
type = "skeleton"
sprite = "sprites/skeleton_atlas"
pivot = [24.0, 0.0]
health = 50
energy = 50
speed = 2

[[entities]]
type = "merchant"
sprite = "sprites/merchant_atlas"
pivot = [24.0, 0.0]
health = 80
energy = 80
speed = 1

[[spawn]]
entity_type = "summoner"
name = "summoner"
position = 500

[commands]
initial = ["consult", "raise", "harvest", "pact"]

[[commands.definitions]]
name = "consult"
description = "Consult the spirits"
args = []
effects = [
  { type = "modify_stat", target = "self", stat = "energy", amount = 10 },
  { type = "output", message = "[consult] The spirits whisper..." },
]

[[commands.definitions]]
name = "raise"
description = "Raise the dead"
args = []
effects = [
  { type = "spawn", entity_type = "skeleton", offset = 1 },
  { type = "modify_stat", target = "self", stat = "energy", amount = -30 },
  { type = "output", message = "[raise] A skeleton rises!" },
]

[[commands.definitions]]
name = "harvest"
description = "Harvest essence"
args = []
effects = [
  { type = "modify_stat", target = "self", stat = "energy", amount = 20 },
  { type = "output", message = "[harvest] Essence absorbed." },
]

[[commands.definitions]]
name = "pact"
description = "Forge a dark pact"
args = []
effects = [
  { type = "modify_stat", target = "self", stat = "health", amount = -10 },
  { type = "modify_stat", target = "self", stat = "energy", amount = 50 },
  { type = "output", message = "[pact] Power surges through you..." },
]
